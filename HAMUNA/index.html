<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin Resto</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-box">

    <div class="logo">
        <h1>🍽️ Admin Resto</h1>
        <p>Silakan masuk ke dashboard</p>
    </div>

    <form id="loginForm">

        <div class="input-group">
            <label>Email</label>
            <input
                type="email"
                id="email"
                placeholder="admin@email.com"
                required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Masukkan password"
                required>
        </div>

        <button type="submit" class="btn-login">
            Masuk
        </button>

    </form>

    <div class="footer">
        Sistem Manajemen Hamuna Resto
    </div>

</div>

<script src="js/scrip.js"></script>

</body>
</html>
