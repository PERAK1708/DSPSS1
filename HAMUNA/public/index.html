<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>MENU Resto Digital</title>

<link rel="stylesheet" href="../css/stylepelanggan.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<!-- HEADER -->

<header class="header">

    <div class="logo">
        🍽️ SxxxxxxL
    </div>

    <div class="subtitle">
        Pesan langsung dari Rumah & meja Anda 
    </div>

</header>

<!-- SEARCH -->

<div class="search-box">

    <input
        type="text"
        id="searchMenu"
        placeholder="Cari menu...">

</div>

<!-- KATEGORI -->

<div class="category">

    <button class="active">
        Semua
    </button>

    <button>
        Makanan
    </button>

    <button>
        Minuman
    </button>

    <button>
        Dessert
    </button>

</div>

<!-- MENU -->

<div class="container">

    <!-- MENU -->
    <div id="menuList" class="menu-grid"></div>

    <!-- KERANJANG -->
    <div class="checkout">
        <input type="text" id="customerName" placeholder="Nama Kamu">
        <input type="text" id="tableNumber" placeholder="Nomor Meja">

        <button onclick="checkout()">
            Kirim Pesanan
        </button>
    </div>

</div>


<script src="../js/firebase.js"></script>
<script src="../js/app.js"></script>

</body>
</html>
