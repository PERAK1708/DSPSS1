<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Top Up Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../CSS/data.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="title">Menu Top Up & Pembayaran</div>

    <div class="card-grid">

        <div class="card" onclick="menuClick('Transfer Bank')">
            <i class="fa-solid fa-building-columns"></i>
            <span>Transfer Bank</span>
            <small>Antar bank cepat</small>
        </div>

        <div class="card" onclick="menuClick('E-Money')">
            <i class="fa-solid fa-wallet"></i>
            <span>Top Up E-Money</span>
            <small>OVO, DANA, GOPAY</small>
        </div>

        <div class="card" onclick="menuClick('Game')">
            <i class="fa-solid fa-gamepad"></i>
            <span>Top Up Game</span>
            <small>ML, FF, PUBG</small>
        </div>

        <div class="card" onclick="menuClick('Pulsa/Token')">
            <i class="fa-solid fa-mobile-screen"></i>
            <span>Pulsa / Token</span>
            <small>Pulsa & listrik</small>
        </div>

        <div class="card" onclick="menuClick('Asuransi')">
            <i class="fa-solid fa-shield-heart"></i>
            <span>Asuransi</span>
            <small>Perlindungan aman</small>
        </div>

    </div>

    <script src="../JS/data.js"></script>

</body>
</html>
