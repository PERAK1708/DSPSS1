<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pemasukan</title>

    <link rel="stylesheet" href="../css/pemasukan.css">
</head>
<body>

<div class="card">

    <h1>Data Pemasukan</h1>

    <div class="form-group">
        <input type="text" id="nama" placeholder="Nama pemasukan">
    </div>

    <div class="form-group">
        <input type="number" id="jumlah" placeholder="Jumlah uang">
    </div>

    <button onclick="tambahData()">
        Tambah
    </button>

    <table>

        <thead>
            <tr>
                <th>Nama</th>
                <th>Jumlah</th>
            </tr>
        </thead>

        <tbody id="tbody"></tbody>

    </table>

    <div class="total">
        Total : Rp <span id="total">0</span>
    </div>

</div>

<script src="../js/pemasukan.js"></script>

</body>
</html>
